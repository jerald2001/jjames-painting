<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="J. James Painting Contractors">
  <defs>
    <radialGradient id="paint" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#7CD63E" />
      <stop offset="100%" stop-color="#5DBE2E" />
    </radialGradient>
  </defs>
  <!-- Navy paint-can outer ring -->
  <circle cx="32" cy="34" r="26" fill="#13225C" />
  <!-- Green paint surface -->
  <circle cx="32" cy="34" r="20" fill="url(#paint)" />
  <!-- Navy lid / rim band -->
  <rect x="20" y="8" width="24" height="8" rx="2" fill="#13225C" />
  <!-- Subtle highlight on the lid -->
  <rect x="22" y="10" width="20" height="2" rx="1" fill="#2C3E80" />
  <!-- Sky-blue brush sweep arcing out of the can -->
  <path d="M 14 18 Q 22 6, 36 6" stroke="#6FB6E8" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Highlight on the brush tip -->
  <circle cx="36" cy="6" r="1.5" fill="#A8D5F0" />
</svg>
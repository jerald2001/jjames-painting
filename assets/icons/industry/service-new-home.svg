<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="New home painting">
  <title>New home painting</title>
  <!-- Open doorway: door frame + slightly ajar door -->
  <g stroke="#13225C" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <path d="M 14 54 L 14 16 L 42 16 L 42 54" />
    <!-- Ajar door panel (rotated slightly outward) -->
    <path d="M 14 16 L 36 12 L 36 54 L 14 50 Z" fill="#13225C" fill-opacity="0.04" />
  </g>
  <!-- Sky-blue threshold light coming through the opening -->
  <path d="M 42 54 L 56 50 L 56 18 L 42 16" fill="#6FB6E8" fill-opacity="0.3" />
  <!-- Door handle -->
  <circle cx="20" cy="34" r="1.6" fill="#13225C" />
  <!-- Green key in mid-handover, arcing toward the doorway -->
  <g stroke="#5DBE2E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="30" r="4" />
    <line x1="48" y1="33" x2="46" y2="40" />
    <line x1="46" y1="38" x2="49" y2="38" />
  </g>
  <circle cx="50" cy="30" r="1.5" fill="#5DBE2E" />
</svg>
